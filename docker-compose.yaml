services:
  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: >
      bash -c "
        gcloud beta emulators pubsub start --host-port=0.0.0.0:8085 &
        PUBSUB_EMULATOR_HOST=localhost:8085 bash /scripts/create_topic.sh &&
        wait
      "
    ports:
      - "8085:8085"
    volumes:
      - ./scripts:/scripts:ro
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/pubsub-ready"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  ingestion:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    ports:
      - "50051:50051"
    environment:
      - GCP_PROJECT_ID=local-dev
      - PUBSUB_TOPIC_ID=sensor-readings
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
    depends_on:
      pubsub-emulator:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 50051)); s.close()\""]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  edge-simulator:
    build:
      context: ./edge-simulator
      dockerfile: Dockerfile
    environment:
      - INGESTION_TARGET=ingestion:50051
      - REPORT_INTERVAL=5
    depends_on:
      ingestion:
        condition: service_healthy

  firestore-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: >
      gcloud beta emulators firestore start --host-port=0.0.0.0:8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  processor:
    build:
      context: ./processor
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - GCP_PROJECT_ID=local-dev
      - PROCESSOR_MODE=pull
      - PUBSUB_SUBSCRIPTION_ID=sensor-readings-processor
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - FIRESTORE_EMULATOR_HOST=firestore-emulator:8080
      - PORT=8081
      - BIGQUERY_PROJECT_ID=distributed-iot-pipeline
      - BIGQUERY_DATASET_ID=freezer_monitor
      - GOOGLE_APPLICATION_CREDENTIALS=/gcp/adc.json
    volumes:
      - ~/.config/gcloud/application_default_credentials.json:/gcp/adc.json:ro
    depends_on:
      pubsub-emulator:
        condition: service_healthy
      firestore-emulator:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  query-service:
    build:
      context: ./query-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - BIGQUERY_PROJECT_ID=distributed-iot-pipeline
      - BIGQUERY_DATASET_ID=freezer_monitor
      - TEMP_MAX_C=-15
      - PORT=8082
      - GOOGLE_APPLICATION_CREDENTIALS=/gcp/adc.json
    volumes:
      - ~/.config/gcloud/application_default_credentials.json:/gcp/adc.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
